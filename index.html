<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f2937">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AISC Shapes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="stylesheet" href="style.css">
<title>AISC Shape Lookup</title>
</head>
<body>
<header>
  <h1>AISC Shapes</h1>
  <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="characters"
         placeholder="W18X50, HSS6X4X1/4, L4X4X1/2…" aria-label="Search shapes">
  <div id="filters" class="filters" role="group" aria-label="Shape type filter"></div>
</header>
<main>
  <div id="status" class="status">Loading database…</div>
  <ul id="results" class="results" hidden></ul>
</main>
<script src="app.js"></script>
</body>
</html>
